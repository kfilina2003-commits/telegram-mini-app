<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ксения Филина — Проводник Света</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Forum&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #d0d1e0;
      --bg-soft: #ececf4;
      --bg-accent: #f5f1f8;

      --c0: #b7a0be;
      --c1: #cea1e1;
      --c2: #807fad;
      --c3: #a1afcd;
      --c4: #d0d1e0;

      --text-main: #4b5f96;
      --text-dark: #3a4a75;
      --text-soft: rgba(75, 95, 150, 0.78);
      --line: rgba(75, 95, 150, 0.12);
      --glass: rgba(255, 255, 255, 0.42);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: var(--bg-main);
      font-family: 'Montserrat', -apple-system, sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body { color: var(--text-main); }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      isolation: isolate;
      padding-bottom: 80px;
      background:
        radial-gradient(circle at 18% 14%, rgba(206, 161, 225, 0.18), transparent 25%),
        radial-gradient(circle at 82% 18%, rgba(161, 175, 205, 0.18), transparent 24%),
        radial-gradient(circle at 50% 78%, rgba(183, 160, 190, 0.16), transparent 30%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-main) 54%, #cdd0e2 100%);
    }

    .hero::before, .hero::after {
      content: ""; position: absolute; inset: -12%; pointer-events: none; z-index: 0;
    }

    .hero::before {
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.55), transparent 14%),
        radial-gradient(circle at 52% 44%, rgba(206, 161, 225, 0.22), transparent 18%),
        radial-gradient(circle at 44% 54%, rgba(161, 175, 205, 0.18), transparent 20%);
      filter: blur(56px); animation: bgBreath 13s ease-in-out infinite; will-change: transform, opacity;
    }

    .hero::after {
      background:
        linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.30) 46%, transparent 54%),
        linear-gradient(295deg, transparent 0%, rgba(255,255,255,0.14) 46%, transparent 54%);
      opacity: 0.72; animation: shimmerField 20s linear infinite; will-change: transform;
    }

    .grain {
      position: absolute; inset: 0; z-index: 1; opacity: 0.04; pointer-events: none;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(63,57,86,.6) 0 0.65px, transparent 1px),
        radial-gradient(circle at 70% 40%, rgba(63,57,86,.38) 0 0.65px, transparent 1px),
        radial-gradient(circle at 30% 70%, rgba(63,57,86,.38) 0 0.65px, transparent 1px),
        radial-gradient(circle at 90% 80%, rgba(63,57,86,.28) 0 0.65px, transparent 1px);
      background-size: 260px 260px, 340px 340px, 290px 290px, 400px 400px;
      animation: dustShift 24s linear infinite;
    }

    .hero-inner {
      position: relative;
      z-index: 3;
      width: min(1000px, 100%);
      padding: 60px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--glass);
      color: rgba(75, 95, 150, 0.85);
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.42);
      z-index: 10;
    }

    /* Анимация затравки (Без центральной точки) */
    .visual {
position: relative;
      width: min(80vw, 420px);
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -20px 0;
      z-index: 2;
    }

    .core {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 0 28px rgba(128, 127, 173, 0.18));
      will-change: transform;
    }

    .pearl, .mist, .ring, .halo, .spark { position: absolute; pointer-events: none; }
    
    .pearl { border-radius: 50% 50% 46% 54% / 44% 56% 48% 52%; mix-blend-mode: screen; }
    .pearl-outer { width: 92%; height: 92%; background: radial-gradient(circle at 28% 32%, rgba(255,255,255,0.34), transparent 26%), radial-gradient(circle at 72% 28%, rgba(161,175,205,0.22), transparent 28%), radial-gradient(circle at 38% 72%, rgba(206,161,225,0.20), transparent 26%), radial-gradient(circle at 50% 50%, rgba(183,160,190,0.18), transparent 58%); filter: blur(28px); animation: morphOuter 15s ease-in-out infinite; }
    .pearl-mid { width: 72%; height: 72%; background: radial-gradient(circle at 28% 30%, rgba(255,255,255,0.86), transparent 18%), radial-gradient(circle at 25% 72%, rgba(206,161,225,0.42), transparent 34%), radial-gradient(circle at 72% 34%, rgba(161,175,205,0.48), transparent 34%), radial-gradient(circle at 62% 70%, rgba(183,160,190,0.34), transparent 32%), radial-gradient(circle at 50% 50%, rgba(128,127,173,0.40), rgba(208,209,224,0.18) 58%, transparent 84%); filter: blur(8px); box-shadow: inset 0 0 44px rgba(255,255,255,0.22), inset -18px -12px 32px rgba(128,127,173,0.10), 0 0 34px rgba(206,161,225,0.16); animation: morphMid 10s ease-in-out infinite; }
    
    /* Центральная точка (pearl-inner) удалена по запросу */

    /* Туманы */
    .mist { border-radius: 50%; mix-blend-mode: screen; filter: blur(34px); opacity: 0.8; }
    .mist-1 { width: 60%; height: 80%; background: radial-gradient(circle, rgba(208,209,224,0.3), transparent 70%); transform: rotate(26deg); animation: float1 8.5s infinite; }
    .mist-2 { width: 80%; height: 60%; background: radial-gradient(circle, rgba(206,161,225,0.25), transparent 70%); transform: rotate(-18deg); animation: float2 10.5s infinite; }
    .mist-3 { width: 70%; height: 70%; background: radial-gradient(circle, rgba(161,175,205,0.2), transparent 68%); animation: float3 12s infinite; }

    /* Кольца и Гало */
    .halo, .ring { border: 1px solid rgba(93, 86, 122, 0.12); border-radius: 50%; }
    .halo-1 { width: 78%; height: 78%; animation: spinSlow 18s linear infinite; }
    .halo-2 { width: 98%; height: 98%; border-color: rgba(161,175,205,0.14); animation: spinReverse 26s linear infinite; }
    .ring-1 { width: 110%; height: 85%; border-color: rgba(206,161,225,0.18); transform: rotate(18deg); animation: tilt1 11s infinite; }
    .ring-2 { width: 90%; height: 120%; border-color: rgba(161,175,205,0.15); transform: rotate(-14deg); animation: tilt2 13s infinite; }

    /* Искры */
    .spark { width: 5px; height: 5px; border-radius: 50%; background: #fff; box-shadow: 0 0 15px #fff; opacity: 0.8; }
    .s1 { top: 16%; left: 54%; animation: drift1 8s infinite; }
    .s2 { top: 28%; left: 22%; animation: drift2 10s infinite; }
    .s3 { top: 72%; left: 34%; animation: drift3 9s infinite; }
    .s4 { top: 68%; left: 76%; animation: drift4 11s infinite; }
    .s5 { top: 44%; left: 84%; animation: drift5 12s infinite; }
    .s6 { top: 22%; left: 72%; animation: drift6 9s infinite; }
    .s7 { top: 54%; left: 14%; animation: drift7 10.5s infinite; }
    .s8 { top: 84%; left: 58%; animation: drift8 12.5s infinite; }

    /* Заголовок с наложением (Шрифт Forum) */
    h1 {
      font-family: 'Forum', serif;
      font-size: clamp(52px, 8.5vw, 100px); /* Скорректировано для шрифта Forum */
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1;
      margin-top: -90px;
      margin-bottom: 30px;
      position: relative;
      z-index: 10;
      text-shadow: 0 0 30px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.6);
white-space: nowrap;
    }

    /* Плейсхолдер для фото */
    .photo-square {
      width: clamp(280px, 45vw, 380px);
      aspect-ratio: 1 / 1;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 
        0 24px 48px rgba(128, 127, 173, 0.15),
        inset 0 0 0 1px rgba(206, 161, 225, 0.3);
      position: relative;
      z-index: 10;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInElement 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a1afcd;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Текст-описание */
    .subtitle {
      max-width: 680px;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 3vw, 26px);
      line-height: 1.5;
      color: var(--text-dark);
      margin-bottom: 48px;
      position: relative;
      z-index: 10;
      opacity: 0;
      animation: fadeInElement 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.9s forwards;
    }

    .subtitle span { color: #b7a0be; margin: 0 6px; }

    /* Кнопки */
    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      position: relative;
      z-index: 10;
      opacity: 0;
      animation: fadeInElement 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 1.2s forwards;
    }

    .btn-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; width: 100%; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      text-decoration: none; border: none; border-radius: 999px;
      padding: 16px 32px; font-size: 16px; font-weight: 500;
      cursor: pointer; transition: all .35s ease;
    }

    .btn svg { width: 20px; height: 20px; }

    .btn-primary {
      color: white; background: linear-gradient(135deg, #cea1e1 0%, #b7a0be 40%, #807fad 100%);
      box-shadow: 0 14px 34px rgba(128, 127, 173, 0.25), 0 0 0 0 rgba(206, 161, 225, 0.6);
      padding: 18px 42px; font-size: 17px; 
      animation: pulseBtn 2s infinite; /* Анимация стала быстрее */
    }

    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 18px 42px rgba(128, 127, 173, 0.35), 0 0 20px rgba(206, 161, 225, 0.4); }

    .btn-secondary { color: var(--text-dark); background: rgba(255,255,255,0.6); border: 1px solid rgba(75,95,150,0.15); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); }
    .btn-secondary:hover { transform: translateY(-2px); background: rgba(255,255,255,0.85); }

    .btn-tertiary { color: var(--text-soft); background: transparent; border: 1px solid rgba(75,95,150,0.2); }
    .btn-tertiary:hover { background: rgba(255,255,255,0.3); color: var(--text-dark); }

    /* Ключевые кадры Анимаций */
    @keyframes fadeInElement { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseBtn { 
      0% { box-shadow: 0 14px 34px rgba(128, 127, 173, 0.25), 0 0 0 0 rgba(206, 161, 225, 0.5); }
      70% { box-shadow: 0 14px 34px rgba(128, 127, 173, 0.25), 0 0 0 15px rgba(206, 161, 225, 0); }
      100% { box-shadow: 0 14px 34px rgba(128, 127, 173, 0.25), 0 0 0 0 rgba(206, 161, 225, 0); }
    }
    
    /* Анимации Базовые */
    @keyframes bgBreath { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: .90; } }
    @keyframes shimmerField { 0% { transform: translateX(-2%) scale(1.18); } 50% { transform: translateX(2%) scale(1.22); } 100% { transform: translateX(-2%) scale(1.18); } }
    @keyframes dustShift { 0% { transform: translate(0,0); } 50% { transform: translate(8px,-10px); } 100% { transform: translate(0,0); } }
    @keyframes morphOuter { 0%,100% { transform: scale(1) rotate(0deg); border-radius: 50% 50% 46% 54% / 44% 56% 48% 52%; } 50% { transform: scale(1.04) rotate(6deg); border-radius: 56% 44% 50% 50% / 40% 60% 44% 56%; } }
@keyframes morphMid { 0%,100% { transform: scale(1) rotate(0deg); border-radius: 50% 50% 46% 54% / 44% 56% 48% 52%; } 50% { transform: scale(1.06) rotate(-6deg); border-radius: 58% 42% 48% 52% / 42% 58% 40% 60%; } }
    @keyframes float1 { 0%,100% { transform: rotate(26deg) translate(0,0) scale(1); } 50% { transform: rotate(34deg) translate(10px,-12px) scale(1.08); } }
    @keyframes float2 { 0%,100% { transform: rotate(-18deg) translate(0,0) scale(1); } 50% { transform: rotate(-8deg) translate(-14px,10px) scale(1.06); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(8px,-8px) scale(1.06); } }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes tilt1 { 0%,100% { transform: rotate(18deg) scale(1); } 50% { transform: rotate(26deg) scale(1.03); } }
    @keyframes tilt2 { 0%,100% { transform: rotate(-14deg) scale(1); } 50% { transform: rotate(-7deg) scale(.98); } }
    @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); opacity:.6; } 50% { transform: translate(-10px,-18px) scale(1.2); opacity:1; } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0); opacity:.45; } 50% { transform: translate(16px,-10px); opacity:.9; } }
    @keyframes drift3 { 0%,100% { transform: translate(0,0); opacity:.5; } 50% { transform: translate(-12px,14px); opacity:.95; } }
    @keyframes drift4 { 0%,100% { transform: translate(0,0); opacity:.55; } 50% { transform: translate(10px,-16px); opacity:1; } }
    @keyframes drift5 { 0%,100% { transform: translate(0,0); opacity:.45; } 50% { transform: translate(-18px,8px); opacity:.85; } }
    @keyframes drift6 { 0%,100% { transform: translate(0,0); opacity:.55; } 50% { transform: translate(12px,16px); opacity:1; } }
    @keyframes drift7 { 0%,100% { transform: translate(0,0); opacity:.4; } 50% { transform: translate(14px,-12px); opacity:.82; } }
    @keyframes drift8 { 0%,100% { transform: translate(0,0); opacity:.45; } 50% { transform: translate(-10px,12px); opacity:.88; } }

    /* Мобильная адаптация */
    @media (max-width: 640px) {
      .hero-inner { padding: 40px 12px 10px; }
      .eyebrow { font-size: 11px; padding: 8px 16px; gap: 8px; }
      .visual { width: 100%; height: 300px; margin: -30px 0; }
      .core { filter: drop-shadow(0 0 20px rgba(128, 127, 173, 0.15)); }
      h1 { margin-top: -50px; margin-bottom: 20px; font-size: clamp(40px, 12vw, 60px); }
      .photo-square { width: 94%; aspect-ratio: 1 / 1; margin-bottom: 30px; border-radius: 20px; }
      .subtitle { font-size: 19px; line-height: 1.45; margin-bottom: 36px; padding: 0 8px; }
      .subtitle span { margin: 0 4px; }
      .btn-row { flex-direction: column; }
      .btn { width: 100%; }
      .grain, .hero::after { display: none; }
      .hero::before { filter: blur(30px); }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="grain"></div>

    <div class="hero-inner">
      <div class="eyebrow">энергия • кристалл души • меркаба</div>

      <div class="visual">
        <div class="core">
          <div class="pearl pearl-outer"></div>
          
          <div class="mist mist-1"></div>
          <div class="mist mist-2"></div>
          <div class="mist mist-3"></div>
          
          <div class="halo halo-1"></div>
          <div class="halo halo-2"></div>
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          
          <div class="pearl pearl-mid"></div>
          
          <span class="spark s1"></span>
          <span class="spark s2"></span>
          <span class="spark s3"></span>
          <span class="spark s4"></span>
          <span class="spark s5"></span>
          <span class="spark s6"></span>
          <span class="spark s7"></span>
          <span class="spark s8"></span>
        </div>
      </div>

      <h1>Ксения Филина</h1>

      <div class="photo-square">
        Место для фото
      </div>
<div class="subtitle">
        Проводник Света <span>~</span> Дух, который помнит себя <span>~</span> Исследователь душ <span>~</span> Считываю хроники памяти <span>~</span> архитектура 5D измерения
      </div>

      <div class="actions">
        <a href="#" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"></path>
            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
          </svg>
          Записаться
        </a>
        
        <div class="btn-row">
          <a href="#" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 2L11 13"></path>
              <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
            </svg>
            Telegram-канал
          </a>
          
          <a href="#services" class="btn btn-tertiary">
            Узнать об услугах
          </a>
        </div>
      </div>
    </div>
  </section>

  <section id="services" style="min-height: 100vh; background: #fff; padding: 100px 20px; text-align: center;">
    <h2 style="font-family: 'Forum', serif; font-size: 40px; color: #4b5f96;">Мои услуги</h2>
  </section>

</body>
</html>
