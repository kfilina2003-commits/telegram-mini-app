<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Variant 1 — Pearl Iteration</title>
  <style>
    :root {
      --bg-main: #d0d1e0;
      --bg-soft: #ececf4;
      --bg-accent: #f5f1f8;

      --c0: #b7a0be;
      --c1: #cea1e1;
      --c2: #807fad;
      --c3: #a1afcd;
      --c4: #d0d1e0;

      --text-main: #4b5f96;
      --text-soft: rgba(75, 95, 150, 0.78);
      --line: rgba(75, 95, 150, 0.12);
      --glass: rgba(255, 255, 255, 0.42);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body { color: var(--text-main); }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 14%, rgba(206, 161, 225, 0.18), transparent 25%),
        radial-gradient(circle at 82% 18%, rgba(161, 175, 205, 0.18), transparent 24%),
        radial-gradient(circle at 50% 78%, rgba(183, 160, 190, 0.16), transparent 30%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-main) 54%, #cdd0e2 100%);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      inset: -12%;
      pointer-events: none;
      z-index: 0;
    }

    .hero::before {
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.55), transparent 14%),
        radial-gradient(circle at 52% 44%, rgba(206, 161, 225, 0.22), transparent 18%),
        radial-gradient(circle at 44% 54%, rgba(161, 175, 205, 0.18), transparent 20%);
      filter: blur(56px);
      animation: bgBreath 13s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .hero::after {
      background:
        linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.30) 46%, transparent 54%),
        linear-gradient(295deg, transparent 0%, rgba(255,255,255,0.14) 46%, transparent 54%);
      opacity: 0.72;
      animation: shimmerField 20s linear infinite;
      will-change: transform;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.04;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(63,57,86,.6) 0 0.65px, transparent 1px),
        radial-gradient(circle at 70% 40%, rgba(63,57,86,.38) 0 0.65px, transparent 1px),
        radial-gradient(circle at 30% 70%, rgba(63,57,86,.38) 0 0.65px, transparent 1px),
        radial-gradient(circle at 90% 80%, rgba(63,57,86,.28) 0 0.65px, transparent 1px);
      background-size: 260px 260px, 340px 340px, 290px 290px, 400px 400px;
      animation: dustShift 24s linear infinite;
    }

    .hero-inner {
      position: relative;
      z-index: 3;
      width: min(1180px, 100%);
      padding: 44px 24px 84px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: center;
    }

    .copy { max-width: 530px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--glass);
      color: rgba(75, 95, 150, 0.78);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 18px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.42);
    }

    h1 {
      font-size: clamp(44px, 6vw, 84px);
      line-height: 0.95;
      letter-spacing: -0.045em;
      font-weight: 600;
      margin-bottom: 18px;
      color: #4d629c;
    }

    h1 .sub {
      display: block;
      color: #647bb4;
      text-shadow: 0 0 18px rgba(255,255,255,0.50);
    }

    .copy p {
      max-width: 470px;
font-size: clamp(16px, 2vw, 18px);
      line-height: 1.72;
      color: var(--text-soft);
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      appearance: none;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: transform .35s ease, box-shadow .35s ease, background .35s ease;
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #cea1e1 0%, #b7a0be 30%, #807fad 62%, #a1afcd 100%);
      box-shadow:
        0 14px 34px rgba(128, 127, 173, 0.18),
        0 0 28px rgba(206, 161, 225, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow:
        0 18px 42px rgba(128, 127, 173, 0.24),
        0 0 38px rgba(206, 161, 225, 0.28);
    }

    .btn-secondary {
      color: var(--text-main);
      background: rgba(255,255,255,0.44);
      border: 1px solid rgba(75,95,150,0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.48);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.58);
    }

    .visual {
      position: relative;
      min-height: 540px;
      height: min(78vh, 780px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .core {
      position: relative;
      width: min(42vw, 530px);
      aspect-ratio: 1 / 1.22;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 28px rgba(128, 127, 173, 0.18));
      will-change: transform;
    }

    .pearl, .mist, .ring, .halo, .spark, .sheen {
      position: absolute;
      pointer-events: none;
    }

    .pearl {
      border-radius: 50% 50% 46% 54% / 44% 56% 48% 52%;
      mix-blend-mode: screen;
      will-change: border-radius, transform;
    }

    .pearl-outer {
      width: 96%; height: 96%;
      background:
        radial-gradient(circle at 28% 32%, rgba(255,255,255,0.34), transparent 26%),
        radial-gradient(circle at 72% 28%, rgba(161,175,205,0.22), transparent 28%),
        radial-gradient(circle at 38% 72%, rgba(206,161,225,0.20), transparent 26%),
        radial-gradient(circle at 50% 50%, rgba(183,160,190,0.18), transparent 58%);
      filter: blur(28px);
      animation: morphOuter 15s ease-in-out infinite;
    }

    .pearl-mid {
      width: 74%; height: 74%;
      background:
        radial-gradient(circle at 28% 30%, rgba(255,255,255,0.86), transparent 18%),
        radial-gradient(circle at 25% 72%, rgba(206,161,225,0.42), transparent 34%),
        radial-gradient(circle at 72% 34%, rgba(161,175,205,0.48), transparent 34%),
        radial-gradient(circle at 62% 70%, rgba(183,160,190,0.34), transparent 32%),
        radial-gradient(circle at 50% 50%, rgba(128,127,173,0.40), rgba(208,209,224,0.18) 58%, transparent 84%);
      filter: blur(8px);
      box-shadow:
        inset 0 0 44px rgba(255,255,255,0.22),
        inset -18px -12px 32px rgba(128,127,173,0.10),
        0 0 34px rgba(206,161,225,0.16);
      animation: morphMid 10s ease-in-out infinite;
    }

    .pearl-inner {
      width: 48%; height: 48%;
      background:
        radial-gradient(circle at 35% 34%, rgba(255,255,255,0.98), transparent 22%),
        radial-gradient(circle at 68% 62%, rgba(206,161,225,0.34), transparent 34%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.52), rgba(161,175,205,0.22) 48%, transparent 78%);
      filter: blur(6px);
      box-shadow:
        inset 0 0 24px rgba(255,255,255,0.32),
        0 0 26px rgba(255,255,255,0.26);
      animation: pulse 6s ease-in-out infinite;
    }

    .mist {
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: blur(34px);
      opacity: .95;
      will-change: transform;
    }

    .mist-1 { width: 55%; height: 78%; background: radial-gradient(circle, rgba(208,209,224,0.
32), transparent 70%); transform: rotate(26deg); animation: float1 8.5s ease-in-out infinite; }
    .mist-2 { width: 78%; height: 58%; background: radial-gradient(circle, rgba(206,161,225,0.28), transparent 70%); transform: rotate(-18deg); animation: float2 10.5s ease-in-out infinite; }
    .mist-3 { width: 68%; height: 68%; background: radial-gradient(circle, rgba(161,175,205,0.22), transparent 68%); animation: float3 12s ease-in-out infinite; }

    .sheen {
      width: 28%; height: 92%;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.10), transparent 80%);
      filter: blur(10px);
      opacity: 0.7;
      transform: rotate(22deg) translateX(-10%);
      animation: sheenMove 9.5s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .sheen-2 {
      width: 18%; height: 72%;
      opacity: 0.52;
      transform: rotate(-16deg) translateX(24%);
      animation-duration: 11s;
    }

    .halo, .ring { border: 1px solid rgba(93, 86, 122, 0.14); border-radius: 50%; will-change: transform; }
    .halo-1 { width: 74%; height: 74%; box-shadow: 0 0 28px rgba(206,161,225,0.08); animation: spinSlow 18s linear infinite; }
    .halo-2 { width: 94%; height: 94%; border-color: rgba(161,175,205,0.16); animation: spinReverse 26s linear infinite; }
    .ring-1 { width: 112%; height: 80%; border-color: rgba(206,161,225,0.22); transform: rotate(18deg); animation: tilt1 11s ease-in-out infinite; }
    .ring-2 { width: 86%; height: 118%; border-color: rgba(161,175,205,0.18); transform: rotate(-14deg); animation: tilt2 13s ease-in-out infinite; }

    .spark {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,1), rgba(206,161,225,0.55));
      box-shadow: 0 0 18px rgba(255,255,255,0.56);
      opacity: 0.9;
      will-change: transform, opacity;
    }

    .s1 { top: 16%; left: 54%; animation: drift1 8s ease-in-out infinite; }
    .s2 { top: 28%; left: 22%; animation: drift2 10s ease-in-out infinite; }
    .s3 { top: 72%; left: 34%; animation: drift3 9s ease-in-out infinite; }
    .s4 { top: 68%; left: 76%; animation: drift4 11s ease-in-out infinite; }
    .s5 { top: 44%; left: 84%; animation: drift5 12s ease-in-out infinite; }
    .s6 { top: 22%; left: 72%; animation: drift6 9s ease-in-out infinite; }
    .s7 { top: 54%; left: 14%; animation: drift7 10.5s ease-in-out infinite; }
    .s8 { top: 84%; left: 58%; animation: drift8 12.5s ease-in-out infinite; }

    .scroll-hint {
      position: absolute; left: 50%; bottom: 24px;
      transform: translateX(-50%); z-index: 4;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(75,95,150,0.46);
    }

    .scroll-line {
      width: 1px; height: 52px;
      background: linear-gradient(to bottom, rgba(75,95,150,0.34), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    /* Анимации */
    @keyframes bgBreath { 0%,100% { transform: scale(1) translateY(0); opacity: 1; } 50% { transform: scale(1.06) translateY(-12px); opacity: .90; } }
    @keyframes shimmerField { 0% { transform: translateX(-2%) translateY(0) scale(1.18); } 50% { transform: translateX(2%) translateY(-1%) scale(1.22); } 100% { transform: translateX(-2%) translateY(0) scale(1.18); } }
    @keyframes dustShift { 0% { transform: translate(0,0); } 50% { transform: translate(8px,-10px); } 100% { transform: translate(0,0); } }
    @keyframes morphOuter { 0%,100% { transform: scale(1) rotate(0deg); border-radius: 50% 50% 46% 54% / 44% 56% 48% 52%; } 50% { transform: scale(1.04) rotate(6deg); border-radius: 56% 44% 50% 50% / 40% 60% 44% 56%; } }
    @keyframes morphMid { 0%,100% { transform: scale(1) rotate(0deg); border-radius: 50% 50% 46% 54% / 44% 56% 48% 52%; } 50% { transform: scale(1.06) rotate(-6deg); border-radius: 58% 42% 48% 52% / 42% 58% 40% 60%; } }
@keyframes float1 { 0%,100% { transform: rotate(26deg) translate(0,0) scale(1); } 50% { transform: rotate(34deg) translate(10px,-12px) scale(1.08); } }
    @keyframes float2 { 0%,100% { transform: rotate(-18deg) translate(0,0) scale(1); } 50% { transform: rotate(-8deg) translate(-14px,10px) scale(1.06); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(8px,-8px) scale(1.06); } }
    @keyframes sheenMove { 0%,100% { transform: rotate(22deg) translateX(-18%) scaleY(1); opacity: 0.58; } 50% { transform: rotate(18deg) translateX(18%) scaleY(1.05); opacity: 0.82; } }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes tilt1 { 0%,100% { transform: rotate(18deg) scale(1); } 50% { transform: rotate(26deg) scale(1.03); } }
    @keyframes tilt2 { 0%,100% { transform: rotate(-14deg) scale(1); } 50% { transform: rotate(-7deg) scale(.98); } }
    @keyframes pulse { 0%,100% { transform: scale(.94); opacity: .84; } 50% { transform: scale(1.18); opacity: 1; } }
    @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); opacity:.6; } 50% { transform: translate(-10px,-18px) scale(1.2); opacity:1; } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0); opacity:.45; } 50% { transform: translate(16px,-10px); opacity:.9; } }
    @keyframes drift3 { 0%,100% { transform: translate(0,0); opacity:.5; } 50% { transform: translate(-12px,14px); opacity:.95; } }
    @keyframes drift4 { 0%,100% { transform: translate(0,0); opacity:.55; } 50% { transform: translate(10px,-16px); opacity:1; } }
    @keyframes drift5 { 0%,100% { transform: translate(0,0); opacity:.45; } 50% { transform: translate(-18px,8px); opacity:.85; } }
    @keyframes drift6 { 0%,100% { transform: translate(0,0); opacity:.55; } 50% { transform: translate(12px,16px); opacity:1; } }
    @keyframes drift7 { 0%,100% { transform: translate(0,0); opacity:.4; } 50% { transform: translate(14px,-12px); opacity:.82; } }
    @keyframes drift8 { 0%,100% { transform: translate(0,0); opacity:.45; } 50% { transform: translate(-10px,12px); opacity:.88; } }
    @keyframes scrollPulse { 0%,100% { opacity: .45; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.15); } }

    /* Планшеты */
    @media (max-width: 980px) {
      .hero-inner {
        grid-template-columns: 1fr;
        text-align: center;
        padding-top: 54px;
      }
      .copy {
        max-width: 100%;
        order: 1; /* Текст поднимаем наверх */
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .copy p { max-width: 620px; }
      .visual {
        order: 2; /* Визуал спускаем вниз */
        min-height: 360px;
        height: 46vh;
      }
      .core { width: min(74vw, 390px); }
    }

    /* Мобильные телефоны */
    @media (max-width: 640px) {
      .hero-inner {
        padding-left: 18px;
        padding-right: 18px;
        padding-bottom: 74px;
      }
      /* Оптимизация производительности: убираем лишнее на слабом железе */
      .grain, .hero::after {
        display: none; 
      }
      .hero::before {
        filter: blur(30px); /* Уменьшаем радиус блюра для снижения нагрузки GPU */
      }
      h1 { font-size: clamp(36px, 11vw, 52px); }
      .copy p {
        font-size: 15px;
        line-height: 1.64;
      }
      .actions {
        width: 100%;
        justify-content: center;
      }
      .btn {
        width: 100%;
        max-width: 320px;
        text-align: center;
      }
      .visual {
        min-height: 300px;
        height: 40vh;
      }
      .core { width: min(84vw, 330px); }
      .scroll-hint { bottom: 16px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="grain"></div>

    <div class="hero-inner">
      <div class="copy">
        <div class="eyebrow">энергия • душа • тонкие ответы</div>
        <h1>
          Ксения
<span class="sub">пространство, где ты слышишь себя глубже</span>
        </h1>
        <p>
          Энергодиагностика, хроники души и мягкая работа с внутренним полем —
          как возвращение к себе, к своей истине и к голосу своей души.
        </p>
        <div class="actions">
          <a href="#" class="btn btn-primary">Перейти в Telegram</a>
          <a href="#" class="btn btn-secondary">Узнать об услугах</a>
        </div>
      </div>

      <div class="visual">
        <div class="core">
          <div class="pearl pearl-outer"></div>
          <div class="mist mist-1"></div>
          <div class="mist mist-2"></div>
          <div class="mist mist-3"></div>
          <div class="halo halo-1"></div>
          <div class="halo halo-2"></div>
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          <div class="pearl pearl-mid"></div>
          <div class="sheen"></div>
          <div class="sheen sheen-2"></div>
          <div class="pearl pearl-inner"></div>

          <span class="spark s1"></span>
          <span class="spark s2"></span>
          <span class="spark s3"></span>
          <span class="spark s4"></span>
          <span class="spark s5"></span>
          <span class="spark s6"></span>
          <span class="spark s7"></span>
          <span class="spark s8"></span>
        </div>
      </div>
    </div>

    <div class="scroll-hint">
      <span>scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>
</body>
</html>
